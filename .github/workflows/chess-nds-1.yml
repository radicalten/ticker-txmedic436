name: DSi-curl-v3
on:
  push:
    branches:
    - main
jobs:
  build-nds:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Compile
      run: |
        make -f Makefile-chess-nds-1
    - name: Upload
      uses: actions/upload-artifact@v6
      with:
        name: dsi-curl
        path: |
          *.nds
